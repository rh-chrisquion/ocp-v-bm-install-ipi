    bond_ipv4:
      data: 10.20.10.12/24
      storage: 10.30.10.12/24
      multicast: 10.40.10.12/24

  - hostname: ocp-gen11-03
    role: master
    bmc_address: "redfish-virtualmedia://192.168.100.103/redfish/v1/Systems/1"
    bmc_username: root
    bmc_password: changeme
    boot_mac_address: "00:11:22:33:44:53"
    root_device_hints:
      deviceName: /dev/nvme0n1
    bond_ipv4:
      data: 10.20.10.13/24
      storage: 10.30.10.13/24
      multicast: 10.40.10.13/24

  - hostname: ocp-gen11-04
    role: master
    bmc_address: "redfish-virtualmedia://192.168.100.104/redfish/v1/Systems/1"
