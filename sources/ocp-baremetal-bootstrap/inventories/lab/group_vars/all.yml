# Repository-safe defaults.
# Keep real infrastructure metadata in all.local.yml (gitignored).

ocp_local_values_file: "{{ playbook_dir }}/inventories/lab/group_vars/all.local.yml"
ocp_local_values_required: true

# Safe fallback values used only for documentation and linting.
ocp_cluster_name: example-cluster
ocp_base_domain: example.invalid
ocp_openshift_version: "4.20"
ocp_release_image: quay.io/openshift-release-dev/ocp-release:4.20.0-x86_64
ocp_install_dir: ./build

ocp_agent_image_publish_enabled: false
ocp_agent_image_source_dir: "{{ ocp_install_dir }}"
ocp_agent_image_glob: "*.iso"
ocp_agent_image_publish_dir: /var/lib/ocp-agent-image
ocp_agent_image_publish_filename: agent.x86_64.iso
ocp_agent_image_server_port: 8080
ocp_agent_image_url_host: provisioner.example.invalid

ocp_pull_secret_file: ./secrets/pull-secret.json
ocp_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEexampleexampleexampleexampleexampleexample dummy@example"

ocp_api_vip: 192.0.2.10
ocp_ingress_vip: 192.0.2.9
ocp_machine_network_cidr: 192.0.2.0/24

ocp_cluster_networks:
  - cidr: 10.128.0.0/14
    host_prefix: 23
ocp_service_networks:
  - 172.30.0.0/16

ocp_control_plane_replicas: 5
ocp_worker_replicas: 0
ocp_schedulable_masters: true

ocp_integrity_enabled: true
ocp_integrity_generate_cluster_manifests: true
ocp_integrity_control_plane_target_max_utilization_percent: 60

ocp_integrity_cpu_partitioning:
  enabled: true
  reserved_cpus: "0-3"
  isolated_cpus: "4-31"

ocp_integrity_kubelet_reservations:
  kube_reserved:
    cpu: "1000m"
    memory: "2Gi"
    ephemeral-storage: "1Gi"
  system_reserved:
    cpu: "500m"
    memory: "1Gi"
    ephemeral-storage: "1Gi"
  eviction_hard:
    memory.available: "500Mi"
    nodefs.available: "10%"
    imagefs.available: "15%"

ocp_integrity_placement:
  enforce_taint: false
  control_plane_workload_taint:
    key: node-role.kubernetes.io/control-plane-workload
    value: reserved
    effect: NoSchedule
  required_node_selector:
    workload-tier: platform
  required_topology_spread_key: kubernetes.io/hostname

ocp_integrity_priority_classes:
  - name: platform-critical
    value: 1000000000
    global_default: false
    description: Critical platform workloads required for cluster health.
  - name: platform-standard
    value: 1000000
    global_default: false
    description: Standard platform workloads approved for combined nodes.

ocp_integrity_namespace_guardrails:
  - name: platform-critical
    cpu_requests: "4"
    cpu_limits: "16"
    memory_requests: "8Gi"
    memory_limits: "32Gi"
    pods: "200"
    storage_requests: "500Gi"
    default_request_cpu: "250m"
    default_request_memory: "256Mi"
    default_limit_cpu: "1"
    default_limit_memory: "1Gi"
    pdb_min_available: 1

ocp_hardware_vendor: Generic
ocp_hardware_model: Baremetal
ocp_bmc_protocol: redfish-virtualmedia

ocp_network_bonds:
  data:
    bond_name: bond_data
    members: [eth0, eth1]
    mtu: 9000
    network_cidr: 192.0.2.0/24
    gateway: 192.0.2.1
    default_route: true
    dns_servers: [192.0.2.53, 192.0.2.54]
  storage:
    bond_name: bond_storage
    members: [eth2, eth3]
    mtu: 9000
    network_cidr: 198.51.100.0/24
    gateway: null
    default_route: false
    dns_servers: []
  multicast:
    bond_name: bond_multicast
    members: [eth4, eth5]
    mtu: 9000
    network_cidr: 203.0.113.0/24
    gateway: null
    default_route: false
    dns_servers: []

ocp_ntp_sources:
  - pool.ntp.org

ocp_nodes:
  - hostname: example-node-01
    role: master
    bmc_address: "redfish-virtualmedia://192.0.2.101/redfish/v1/Systems/1"
    bmc_username: root
    bmc_password: changeme
    boot_mac_address: "00:11:22:33:44:51"
    root_device_hints:
      deviceName: /dev/sda
    bond_ipv4:
      data: 192.0.2.11/24
      storage: 198.51.100.11/24
      multicast: 203.0.113.11/24
